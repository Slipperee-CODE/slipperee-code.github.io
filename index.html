<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Wonderful homepage of Cai Scheidler a.k.a. Slipperee-CODE's portfolio website">
    <title>Cai's Portfolio</title>
</head>
<body>
    <canvas id="canvas" width="500" height="400"></canvas>

    <script>
        // Target the canvas element
        const canvas = document.getElementById('canvas');

        // Get the 2D rendering context
        const ctx = canvas.getContext('2d');

        // Draw a solid blue rectangle (X, Y, Width, Height)
        ctx.fillStyle = 'blue';
        ctx.fillRect(50, 50, 150, 100);

        // Draw an outlined red circle
        ctx.beginPath();
        ctx.arc(300, 100, 40, 0, Math.PI * 2); // X, Y, Radius, Start Angle, End Angle
        ctx.strokeStyle = 'red';
        ctx.lineWidth = 5;
        ctx.stroke();
    </script>
</body>
</html>
