<body>
    <div id="navbar" class="font_size_medium center_center_items">

    <script>
        function copyEmail() {
            var textContent = "scheidlercai@gmail.com"
            
            navigator.clipboard.writeText(textContent).then(() => {
                alert("Email copied!");
